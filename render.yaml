services:
  - type: web
    name: rem-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: mkdir -p /tmp/rem/data /tmp/rem/system/databases && uvicorn app:app --app-dir backend --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_ROOT_DIRECTORY
        value: /tmp/rem/data
      - key: SYSTEM_ROOT_DIRECTORY
        value: /tmp/rem/system
      - key: LLM_PROVIDER
        value: custom
      - key: LLM_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: LLM_ENDPOINT
        value: https://api.groq.com/openai/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_RATE_LIMIT_ENABLED
        value: "true"
      - key: LLM_RATE_LIMIT_REQUESTS
        value: "25"
      - key: EMBEDDING_PROVIDER
        value: fastembed
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CHAT_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: CHAT_API_KEY
        sync: false
      - key: CHAT_MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        sync: false
